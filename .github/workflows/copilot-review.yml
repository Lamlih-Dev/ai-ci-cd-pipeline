name: Copilot Code Quality Review

on:
  pull_request:
    branches:
      - main

jobs:
  copilot-code-quality-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Generate code quality review
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          copilot -p "Review the code changes in this pull request for code quality only. Focus on readability, maintainability, naming, structure, duplication, unnecessary complexity, and best practices. Output only clear markdown for my team to understand." > copilot-review.md

      - name: Update PR description
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            if (!fs.existsSync("copilot-review.md")) {
              core.setFailed("copilot-review.md was not generated");
              return;
            }

            const review = fs.readFileSync("copilot-review.md", "utf8").trim();

            if (!review) {
              core.setFailed("Copilot review is empty");
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const startMarker = "<!-- copilot-review-start -->";
            const endMarker = "<!-- copilot-review-end -->";

            const reviewSection = `${startMarker}

            ## 🤖 Copilot Code Quality Review

            ${review}

            ${endMarker}`;

            const currentBody = pr.body || "";
            const markerRegex = new RegExp(`${startMarker}[\\s\\S]*?${endMarker}`);

            const newBody = markerRegex.test(currentBody)
              ? currentBody.replace(markerRegex, reviewSection)
              : `${currentBody}

            ---

            ${reviewSection}`;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: newBody,
            });