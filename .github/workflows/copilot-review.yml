name: Copilot Code Quality Review

on:
  pull_request:
    branches:
      - main

jobs:
  copilot-code-quality-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Generate code quality review
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          copilot -p "Review the code changes in this pull request for code quality only. Focus on readability, maintainability, naming, structure, duplication, unnecessary complexity, and best practices. Output only clear markdown for my team to understand." > copilot-review.md

      - name: Update PR description
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const review = fs.readFileSync("copilot-review.md", "utf8");

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const newBody = `${pr.body || ""}

            ---

            ## 🤖 Copilot Code Quality Review

            ${review}`;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: newBody,
            });