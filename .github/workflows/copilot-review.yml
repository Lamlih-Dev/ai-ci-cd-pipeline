name: Copilot Code Quality Review

on:
  pull_request:
    branches:
      - main

jobs:
  copilot-code-quality-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Generate code quality review
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          copilot -p "Review the code changes in this pull request for code quality only. Focus on readability, maintainability, naming, structure, duplication, unnecessary complexity, and best practices. Add the result to this PR description in clear markdown for my team to understand."